<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer | WineAI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <h2>🍷 WineAI</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="dataset.html">Dataset</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="explorer.html" class="active">Explorer</a></li>
      <li><a href="notebook.html">Notebook</a></li>
    </ul>
  </nav>

  <main class="container">
    <section class="explorer">
      <div class="card inputs">
        <h3>Parameters</h3>
        <label>Fixed Acidity <span id="fixed_acidityValue">7.4</span></label><input type="range" id="fixed_acidity" min="4" max="16" step="0.1" value="7.4">
        <label>Volatile Acidity <span id="vaValue">0.70</span></label><input type="range" id="va" min="0.1" max="2" step="0.01" value="0.70">
        <label>Citric Acid <span id="citricValue">0.30</span></label><input type="range" id="citric" min="0" max="1" step="0.01" value="0.30">
        <label>Residual Sugar <span id="sugarValue">5.0</span></label><input type="range" id="sugar" min="0" max="15" step="0.1" value="5.0">
        <label>Chlorides <span id="chloridesValue">0.08</span></label><input type="range" id="chlorides" min="0.01" max="0.2" step="0.01" value="0.08">
        <label>pH <span id="phValue">3.30</span></label><input type="range" id="ph" min="2.5" max="4.5" step="0.01" value="3.30">
        <label>Sulphates <span id="sulphatesValue">0.60</span></label><input type="range" id="sulphates" min="0.2" max="2" step="0.01" value="0.60">
        <label>Alcohol <span id="alcoholValue">10.5</span></label><input type="range" id="alcohol" min="8" max="15" step="0.1" value="10.5">
        <button onclick="predictWine()">Analyze</button>
      </div>

      <div class="card visualization">
        <h3>Live Profile</h3>
        <canvas id="chart"></canvas>
      </div>

      <div class="card result">
        <h3>Result</h3>
        <div id="loader"></div>
        <div id="output"></div>
        <div id="insights"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Explorer | Wine Quality Intelligence Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Wine Quality Explorer</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="methodology.html">Methodology</a>
      <a href="dataset.html">Dataset</a>
      <a href="results.html">Results</a>
      <a href="explorer.html" class="cta">Launch Explorer</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Wine Quality Explorer</h2>

      <label for="alcohol">Alcohol: <span id="alcoholValue">11.0</span></label>
      <input type="range" id="alcohol" min="8" max="15" step="0.1" value="11.0" />

      <label for="va">Volatile Acidity: <span id="vaValue">0.80</span></label>
      <input type="range" id="va" min="0.1" max="2" step="0.01" value="0.80" />

      <label for="sulphates">Sulphates: <span id="sulphatesValue">0.60</span></label>
      <input type="range" id="sulphates" min="0.2" max="2" step="0.01" value="0.60" />

      <button onclick="predictWine()">Analyze</button>

      <div id="result" class="result"></div>
      <div id="insights" class="insights"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
