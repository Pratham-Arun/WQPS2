<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer | Wine Quality Intelligence Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Wine Quality Explorer</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="methodology.html">Methodology</a>
      <a href="dataset.html">Dataset</a>
      <a href="results.html">Results</a>
      <a href="explorer.html" class="cta">Launch Explorer</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Wine Quality Explorer</h2>

      <label for="alcohol">Alcohol: <span id="alcoholValue">11.0</span></label>
      <input type="range" id="alcohol" min="8" max="15" step="0.1" value="11.0" />

      <label for="va">Volatile Acidity: <span id="vaValue">0.80</span></label>
      <input type="range" id="va" min="0.1" max="2" step="0.01" value="0.80" />

      <label for="sulphates">Sulphates: <span id="sulphatesValue">0.60</span></label>
      <input type="range" id="sulphates" min="0.2" max="2" step="0.01" value="0.60" />

      <button onclick="predictWine()">Analyze</button>

      <div id="result" class="result"></div>
      <div id="insights" class="insights"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
